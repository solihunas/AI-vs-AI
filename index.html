<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jurnal AI vs AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08070d;
  --bg-deep:#040308;
  --card:#13111c;
  --card2:#1a1726;
  --line:#2a2438;
  --violet:#9d4dff;
  --violet-dim:#5e35b1;
  --violet-glow:rgba(157,77,255,.55);
  --txt:#e8e6f0;
  --txt-dim:#9893ab;
  --txt-faint:#5c5770;
  --profit:#26c6a8;
  --loss:#ef5350;
  --mono:'Space Mono',monospace;
  --sans:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  background:var(--bg);
  color:var(--txt);
  font-family:var(--sans);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
body{
  min-height:100vh;
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(157,77,255,.18), transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 100%, rgba(94,53,177,.12), transparent 60%),
    var(--bg);
}

/* ============ HEADER ============ */
#app-header{
  position:sticky;top:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
  padding:14px 16px;
  background:rgba(8,7,13,.85);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--line);
}
.brand{
  display:flex;align-items:center;gap:10px;
}
.brand-mark{
  width:34px;height:34px;border-radius:9px;
  background:linear-gradient(145deg,var(--violet),var(--violet-dim));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-weight:700;font-size:13px;color:#fff;
  box-shadow:0 0 18px var(--violet-glow);
  flex-shrink:0;
}
.brand-text h1{
  font-size:14px;font-weight:800;letter-spacing:.02em;
}
.brand-text p{
  font-size:10px;color:var(--txt-dim);letter-spacing:.08em;text-transform:uppercase;
}
.hdr-actions{display:flex;gap:8px;}
.hdr-btn{
  display:flex;align-items:center;gap:6px;
  padding:9px 12px;
  background:var(--card2);
  border:1px solid var(--line);
  border-radius:9px;
  color:var(--txt);
  font-size:11.5px;font-weight:700;
  cursor:pointer;
  transition:.15s;
  white-space:nowrap;
}
.hdr-btn:active{transform:scale(.96);}
.hdr-btn.primary{
  background:linear-gradient(145deg,var(--violet),var(--violet-dim));
  border-color:transparent;
  box-shadow:0 0 16px var(--violet-glow);
}
.hdr-btn svg{width:14px;height:14px;flex-shrink:0;}

/* ============ MAIN / GRID ============ */
#main{padding:14px;padding-bottom:40px;}

.timeframe-bar{
  display:flex;justify-content:center;
  margin-bottom:14px;
}
.timeframe-bar input{
  background:rgba(157,77,255,.08);
  border:1px solid var(--violet-dim);
  border-radius:999px;
  color:var(--violet);
  font-family:var(--mono);font-weight:700;font-size:13px;
  letter-spacing:.04em;
  text-align:center;
  padding:9px 22px;
  outline:none;
  min-width:200px;
  box-shadow:0 0 16px rgba(157,77,255,.2);
}
.timeframe-bar input:focus{border-color:var(--violet);box-shadow:0 0 22px var(--violet-glow);}
.timeframe-bar input::placeholder{color:var(--txt-faint);}

.grid-2x2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}
@media (max-width:380px){
  .grid-2x2{gap:8px;}
}

/* ============ AI CARD (overview) ============ */
.ai-card{
  position:relative;
  background:linear-gradient(165deg,var(--card2),var(--card));
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 10px;
  cursor:pointer;
  overflow:hidden;
  transition:transform .15s, box-shadow .25s;
  display:flex;flex-direction:column;
  min-height:300px;
}
.ai-card:active{transform:scale(.97);}
/* rotating purple glow ring */
.ai-card::before{
  content:'';
  position:absolute;
  top:-50%;left:-50%;width:200%;height:200%;
  background:conic-gradient(from 0deg,
    transparent 0deg,
    transparent 250deg,
    rgba(157,77,255,.9) 300deg,
    rgba(220,180,255,1) 330deg,
    rgba(157,77,255,.9) 360deg);
  animation:spin-ring 4s linear infinite;
  z-index:0;
}
.ai-card::after{
  content:'';
  position:absolute;
  inset:1.5px;
  border-radius:13px;
  background:linear-gradient(165deg,var(--card2),var(--card));
  z-index:1;
}
.ai-card > *{position:relative;z-index:2;}
@keyframes spin-ring{
  to{transform:rotate(360deg);}
}
.ai-card-hd{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px;
}
.ai-name{
  font-family:var(--mono);font-weight:700;font-size:13px;
  letter-spacing:.03em;
}
.ai-status{
  display:flex;align-items:center;gap:5px;
  font-size:9px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.07em;
}
.ai-status .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--profit);
  box-shadow:0 0 6px var(--profit);
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}

.ai-trades{
  display:flex;flex-direction:column;gap:6px;
  flex:1;
}
.trade-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 8px;
  border-radius:8px;
  font-size:10.5px;
  border:1px solid transparent;
}
.trade-row.profit{background:rgba(38,198,168,.08);border-color:rgba(38,198,168,.18);}
.trade-row.loss{background:rgba(239,83,80,.08);border-color:rgba(239,83,80,.18);}
.trade-left{display:flex;align-items:center;gap:6px;min-width:0;}
.trade-sym{font-weight:800;letter-spacing:.02em;flex-shrink:0;}
.trade-tag{
  font-size:8.5px;color:var(--txt-faint);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.trade-arrow{flex-shrink:0;width:11px;height:11px;}
.trade-arrow.up{color:var(--profit);}
.trade-arrow.down{color:var(--loss);}
.trade-pl{
  font-family:var(--mono);font-weight:700;font-size:11px;flex-shrink:0;
}
.trade-pl.profit{color:var(--profit);}
.trade-pl.loss{color:var(--loss);}

.ai-card-ft{
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid var(--line);
}
.equity-box{
  height:46px;width:100%;
  margin-bottom:6px;
  position:relative;
}
.equity-svg{width:100%;height:100%;display:block;}
.equity-empty{
  height:100%;display:flex;align-items:center;justify-content:center;
  font-size:9px;color:var(--txt-faint);
  border:1px dashed var(--line);border-radius:8px;
}
.equity-val{
  font-family:var(--mono);font-weight:700;font-size:14px;
  text-align:center;
  text-shadow:0 0 12px rgba(157,77,255,.5);
}
.equity-pct{font-size:11px;opacity:.85;}

/* empty state for fewer trades */
.trade-row.empty{
  border:1px dashed var(--line);
  color:var(--txt-faint);
  justify-content:center;
  font-size:9.5px;
}

/* ============ FOCUS MODE ============ */
#focus{
  display:none;
  padding:14px;padding-bottom:60px;
}
#focus.active{display:block;}
#main.hidden{display:none;}

.focus-hd{
  display:flex;align-items:center;gap:10px;
  margin-bottom:14px;
}
.back-btn{
  width:36px;height:36px;border-radius:10px;
  background:var(--card2);border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--txt);flex-shrink:0;
}
.back-btn svg{width:18px;height:18px;}
.focus-title{
  flex:1;min-width:0;
}
.focus-title input{
  background:transparent;border:none;color:var(--txt);
  font-family:var(--mono);font-weight:700;font-size:17px;
  width:100%;outline:none;
  border-bottom:1px dashed transparent;
  padding:2px 0;
}
.focus-title input:focus{border-bottom-color:var(--violet);}
.focus-sub{font-size:10px;color:var(--txt-dim);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;}

.focus-stats{
  display:grid;grid-template-columns:1fr 1fr 1fr;
  gap:8px;margin-bottom:14px;
}
.stat-box{
  background:var(--card2);border:1px solid var(--line);border-radius:10px;
  padding:10px;text-align:center;
}
.stat-box label{font-size:9px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:4px;}
.stat-box .val{font-family:var(--mono);font-weight:700;font-size:15px;}
.stat-box input{
  background:transparent;border:none;color:var(--txt);
  font-family:var(--mono);font-weight:700;font-size:15px;
  width:100%;text-align:center;outline:none;
}
.stat-box .val.profit{color:var(--profit);}

/* Equity panel (focus mode) */
.equity-panel{
  background:var(--card2);border:1px solid var(--line);border-radius:12px;
  padding:14px 12px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.equity-panel-curve{height:90px;width:100%;margin-bottom:8px;}
.equity-panel-val{
  font-family:var(--mono);font-weight:700;font-size:20px;text-align:center;
  text-shadow:0 0 16px rgba(157,77,255,.55);
  margin-bottom:12px;
}
.equity-panel-val .equity-pct{font-size:14px;opacity:.85;}
.equity-input-label{
  display:block;font-size:9.5px;color:var(--txt-dim);
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;
}
.equity-input{
  width:100%;
  background:var(--bg-deep);border:1px solid var(--line);border-radius:8px;
  color:var(--txt);font-family:var(--mono);font-size:12px;
  padding:9px 10px;outline:none;
}
.equity-input:focus{border-color:var(--violet);}

/* Trade list (edit mode) */
.trade-edit-list{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.trade-edit{
  background:var(--card2);border:1px solid var(--line);border-radius:12px;
  padding:10px;
}
.trade-edit-row1{display:flex;gap:6px;margin-bottom:8px;}
.trade-edit input,.trade-edit select{
  background:var(--bg-deep);border:1px solid var(--line);border-radius:7px;
  color:var(--txt);font-size:11.5px;padding:7px 8px;
  font-family:var(--sans);outline:none;
}
.trade-edit input:focus,.trade-edit select:focus{border-color:var(--violet);}
.f-sym{width:64px;font-family:var(--mono);font-weight:700;text-transform:uppercase;}
.f-tag{flex:1;min-width:0;}
.f-dir{width:50px;}
.trade-edit-row2{display:flex;gap:6px;align-items:center;}
.f-pl{flex:1;font-family:var(--mono);font-weight:700;}
.f-pct{width:64px;font-family:var(--mono);}
.del-trade{
  width:32px;height:32px;border-radius:7px;flex-shrink:0;
  background:rgba(239,83,80,.12);border:1px solid rgba(239,83,80,.3);
  color:var(--loss);display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.del-trade svg{width:14px;height:14px;}
.pv-left,.pv-pl{display:none;}

.add-trade-btn{
  width:100%;padding:12px;border-radius:12px;
  border:1px dashed var(--violet-dim);
  background:rgba(157,77,255,.06);
  color:var(--violet);font-weight:700;font-size:12.5px;
  display:flex;align-items:center;justify-content:center;gap:6px;
  cursor:pointer;margin-bottom:14px;
}
.add-trade-btn svg{width:15px;height:15px;}

/* color toggle for trade */
.color-toggle{display:flex;gap:4px;}
.color-opt{
  width:32px;height:32px;border-radius:7px;flex-shrink:0;
  border:1px solid var(--line);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;
}
.color-opt.profit{color:var(--profit);}
.color-opt.loss{color:var(--loss);}
.color-opt.sel{border-color:currentColor;box-shadow:0 0 0 1px currentColor inset;}

/* ============ PREVIEW MODE ============ */
body.preview #app-header .hdr-btn:not(.exit-preview){display:none;}
body.preview .back-btn,
body.preview .del-trade,
body.preview .add-trade-btn,
body.preview .trade-edit-row1 input,
body.preview .trade-edit-row1 select,
body.preview .trade-edit-row2 input,
body.preview .color-toggle{display:none!important;}
body.preview .focus-title input{pointer-events:none;border-bottom:none;}
body.preview .stat-box input{pointer-events:none;}
body.preview .equity-input,
body.preview .equity-input-label{display:none!important;}
body.preview .equity-panel{padding-bottom:14px;}
body.preview .timeframe-bar input{pointer-events:none;border-color:transparent;background:transparent;box-shadow:none;}
body.preview .trade-edit{
  padding:0;border:none;background:transparent;
}
body.preview #focus{padding-top:6px;}

/* preview rendering of trade-edit as a clean row when in preview */
body.preview .trade-edit{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px;border-radius:8px;
  background:rgba(255,255,255,.02);
  border:1px solid var(--line);
  margin-bottom:0;
}
body.preview .trade-edit-row1,body.preview .trade-edit-row2{display:none;}
body.preview .pv-left{display:flex;flex-direction:column;gap:2px;min-width:0;}
body.preview .pv-sym{font-family:var(--mono);font-weight:800;font-size:12px;}
body.preview .pv-tag{font-size:9.5px;color:var(--txt-faint);}
body.preview .pv-pl{display:block;font-family:var(--mono);font-weight:700;font-size:12.5px;text-align:right;flex-shrink:0;}

/* toast */
#toast{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card2);border:1px solid var(--violet-dim);
  color:var(--txt);font-size:12px;font-weight:600;
  padding:10px 18px;border-radius:10px;
  box-shadow:0 0 20px var(--violet-glow);
  opacity:0;pointer-events:none;
  transition:.25s;z-index:200;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<header id="app-header">
  <div class="brand">
    <div class="brand-mark">AI</div>
    <div class="brand-text">
      <h1>Jurnal AI vs AI</h1>
      <p>Trading Battle Log</p>
    </div>
  </div>
  <div class="hdr-actions">
    <button class="hdr-btn" id="btnPreview">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
      Preview
    </button>
    <button class="hdr-btn primary" id="btnDownload">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
      Download
    </button>
    <button class="hdr-btn exit-preview" id="btnExitPreview" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      Tutup Preview
    </button>
  </div>
</header>

<main id="main">
  <div class="timeframe-bar">
    <input type="text" id="timeframeInput" placeholder="cth: 3 Bulan Terakhir" value="3 Bulan Terakhir">
  </div>
  <div class="grid-2x2" id="aiGrid"></div>
</main>

<section id="focus"></section>

<div id="toast"></div>

<script>
/* ============================================================
   STATE
============================================================ */
const STORAGE_KEY='jurnalAiVsAi_v1';

function defaultData(){
  return {
    timeframe:'3 Bulan Terakhir',
    ais:[
      {name:'AI 1',status:'Bot Trading',wins:4,losses:1,
        equity:[0,120,90,260,210,380,520,470,640,810],
        trades:[
        mkTrade('ETH','Put Tertutup','profit',214.11,15.6),
        mkTrade('AAPL','Opsi Call','profit',396.21,58.6),
        mkTrade('AMZN','DCA Beli','profit',120.84,4.0),
        mkTrade('TSLA','Beli Limit','profit',264.37,20.2),
        mkTrade('DOGE','Put Tertutup','loss',-642.79,-22.8),
      ]},
      {name:'AI 2',status:'Bot Trading',wins:3,losses:2,
        equity:[0,80,40,150,90,230,180,360,420,560],
        trades:[
        mkTrade('ETH','Swing Trade','loss',-118.99,-8.1),
        mkTrade('SPY','Beli Pasar','profit',454.74,13.0),
        mkTrade('ETH','Opsi Call','loss',-88.29,-2.7),
        mkTrade('SOL','Ambil Untung','profit',765.86,65.9),
        mkTrade('EUR/USD','Opsi Call','profit',223.27,7.3),
      ]},
      {name:'AI 3',status:'Bot Trading',wins:0,losses:0,equity:[],trades:[]},
      {name:'AI 4',status:'Bot Trading',wins:0,losses:0,equity:[],trades:[]},
    ]
  };
}
function mkTrade(sym,tag,color,pl,pct){
  return {sym:sym||'ETH',tag:tag||'',color:color||'profit',pl:pl||0,pct:pct||0};
}

// build SVG equity curve markup (glowing purple-white) for a given box size
function equitySVG(points,w,h){
  if(!points||points.length<2){
    return '<div class="equity-empty">Belum ada data equity</div>';
  }
  const min=Math.min(...points), max=Math.max(...points);
  const range=(max-min)||1;
  const pad=6;
  const innerW=w-pad*2, innerH=h-pad*2;
  const stepX=innerW/(points.length-1);
  const coords=points.map((v,i)=>{
    const x=pad+i*stepX;
    const y=pad+innerH-((v-min)/range)*innerH;
    return [x,y];
  });
  const linePath=coords.map((c,i)=>(i===0?'M':'L')+c[0].toFixed(1)+' '+c[1].toFixed(1)).join(' ');
  const areaPath=linePath+` L${(pad+innerW).toFixed(1)} ${(pad+innerH).toFixed(1)} L${pad.toFixed(1)} ${(pad+innerH).toFixed(1)} Z`;
  const lastX=coords[coords.length-1][0], lastY=coords[coords.length-1][1];
  const uid='eq'+Math.random().toString(36).slice(2,8);
  return `<svg class="equity-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <defs>
      <linearGradient id="${uid}-area" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(157,77,255,.35)"/>
        <stop offset="100%" stop-color="rgba(157,77,255,0)"/>
      </linearGradient>
      <linearGradient id="${uid}-line" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0%" stop-color="#9d4dff"/>
        <stop offset="100%" stop-color="#ffffff"/>
      </linearGradient>
      <filter id="${uid}-glow" x="-30%" y="-30%" width="160%" height="160%">
        <feGaussianBlur stdDeviation="2.4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <path d="${areaPath}" fill="url(#${uid}-area)" stroke="none"/>
    <path d="${linePath}" fill="none" stroke="url(#${uid}-line)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" filter="url(#${uid}-glow)"/>
    <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3.2" fill="#fff" filter="url(#${uid}-glow)"/>
  </svg>`;
}

// equity summary: nominal + percent  ->  "n USD (+n,nn%)"
function equitySummary(points){
  if(!points||points.length<2)return {usd:0,pct:0};
  const start=points[0], end=points[points.length-1];
  const usd=end-start;
  const base=(start===0)?(Math.max(1,Math.abs(end))):Math.abs(start);
  const pct=(usd/base)*100;
  return {usd,pct};
}
function fmtUSD_id(v){
  const n=Number(v)||0;
  const sign=n>0?'+':(n<0?'-':'');
  return sign+Math.abs(n).toLocaleString('id-ID',{minimumFractionDigits:0,maximumFractionDigits:0})+' USD';
}
function fmtPct_id(v){
  const n=Number(v)||0;
  const sign=n>0?'+':(n<0?'-':'');
  return sign+Math.abs(n).toFixed(2).replace('.',',')+'%';
}

let state=null;
let focusIdx=null;

function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw)return JSON.parse(raw);
  }catch(e){}
  return defaultData();
}
function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}
}

/* ============================================================
   INIT
============================================================ */
state=load();
if(!state.timeframe)state.timeframe='3 Bulan Terakhir';
const tfInput=document.getElementById('timeframeInput');
tfInput.value=state.timeframe;
tfInput.oninput=e=>{state.timeframe=e.target.value;save();};
renderGrid();

/* ============================================================
   GRID (overview)
============================================================ */
function renderGrid(){
  const grid=document.getElementById('aiGrid');
  grid.innerHTML='';
  state.ais.forEach((ai,idx)=>{
    grid.appendChild(buildAICard(ai,idx));
  });
}

function fmtMoneySimple(v){
  const n=Number(v)||0;
  const abs=Math.abs(n).toFixed(2);
  if(n>0)return '+$'+abs;
  if(n<0)return '-$'+abs;
  return '$'+abs;
}
function fmtPct(v){
  const n=Number(v)||0;
  const abs=Math.abs(n).toFixed(1);
  if(n>0)return '+'+abs+'%';
  if(n<0)return '-'+abs+'%';
  return abs+'%';
}

function buildAICard(ai,idx){
  const card=document.createElement('div');
  card.className='ai-card';
  card.onclick=()=>openFocus(idx);

  const eq=equitySummary(ai.equity);
  const eqColor=eq.usd>=0?'var(--violet)':'var(--loss)';

  let tradesHtml='';
  const shown=ai.trades.slice(0,5);
  shown.forEach(t=>{
    const isProfit=t.color==='profit';
    tradesHtml+=`
      <div class="trade-row ${isProfit?'profit':'loss'}">
        <div class="trade-left">
          <svg class="trade-arrow ${isProfit?'up':'down'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            ${isProfit?'<path d="M12 19V5M5 12l7-7 7 7"/>':'<path d="M12 5v14M19 12l-7 7-7-7"/>'}
          </svg>
          <span class="trade-sym">${esc(t.sym)}</span>
          <span class="trade-tag">${esc(t.tag)}</span>
        </div>
        <span class="trade-pl ${isProfit?'profit':'loss'}">${fmtMoneySimple(t.pl)}</span>
      </div>`;
  });
  for(let i=shown.length;i<5;i++){
    tradesHtml+=`<div class="trade-row empty">— kosong —</div>`;
  }

  card.innerHTML=`
    <div class="ai-card-hd">
      <span class="ai-name">${esc(ai.name)}</span>
      <span class="ai-status"><span class="dot"></span>${esc(ai.status)}</span>
    </div>
    <div class="ai-trades">${tradesHtml}</div>
    <div class="ai-card-ft">
      <div class="equity-box">${equitySVG(ai.equity,150,46)}</div>
      <div class="equity-val" style="color:${eqColor}">
        ${fmtUSD_id(eq.usd)} <span class="equity-pct">(${fmtPct_id(eq.pct)})</span>
      </div>
    </div>
  `;
  return card;
}

function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ============================================================
   FOCUS MODE (edit per-AI)
============================================================ */
function openFocus(idx){
  focusIdx=idx;
  document.getElementById('main').classList.add('hidden');
  const focus=document.getElementById('focus');
  focus.classList.add('active');
  renderFocus();
  window.scrollTo(0,0);
}
function closeFocus(){
  focusIdx=null;
  document.getElementById('main').classList.remove('hidden');
  document.getElementById('focus').classList.remove('active');
  renderGrid();
  window.scrollTo(0,0);
}

function renderFocus(){
  const ai=state.ais[focusIdx];
  const focus=document.getElementById('focus');
  if(!ai.equity)ai.equity=[];
  const eq=equitySummary(ai.equity);
  const eqColor=eq.usd>=0?'var(--violet)':'var(--loss)';

  let tradesHtml='';
  ai.trades.forEach((t,ti)=>{
    tradesHtml+=`
      <div class="trade-edit" data-ti="${ti}">
        <div class="trade-edit-row1">
          <input class="f-sym" data-f="sym" value="${esc(t.sym)}" placeholder="ETH" maxlength="8">
          <input class="f-tag" data-f="tag" value="${esc(t.tag)}" placeholder="Tipe order (cth: Opsi Call)">
        </div>
        <div class="trade-edit-row2">
          <div class="color-toggle">
            <div class="color-opt profit ${t.color==='profit'?'sel':''}" data-f="color" data-v="profit" title="Profit">↑</div>
            <div class="color-opt loss ${t.color==='loss'?'sel':''}" data-f="color" data-v="loss" title="Loss">↓</div>
          </div>
          <input class="f-pl" data-f="pl" type="number" step="0.01" value="${t.pl}" placeholder="P/L $">
          <input class="f-pct" data-f="pct" type="number" step="0.1" value="${t.pct}" placeholder="%">
          <div class="del-trade" data-action="del-trade">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2m3 0l-1 14a2 2 0 01-2 2H7a2 2 0 01-2-2L4 6"/></svg>
          </div>
        </div>
        <!-- preview-only render -->
        <span class="pv-left">
          <span class="pv-sym">${esc(t.sym)}</span>
          <span class="pv-tag">${esc(t.tag)}</span>
        </span>
        <span class="pv-pl" style="color:${t.color==='profit'?'var(--profit)':'var(--loss)'}">${fmtMoneySimple(t.pl)} <small style="opacity:.7">${fmtPct(t.pct)}</small></span>
      </div>`;
  });

  focus.innerHTML=`
    <div class="focus-hd">
      <div class="back-btn" id="btnBack">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </div>
      <div class="focus-title">
        <input type="text" id="aiNameInput" value="${esc(ai.name)}" placeholder="Nama AI">
        <div class="focus-sub">${esc(ai.status)} · Edit Jurnal</div>
      </div>
    </div>

    <div class="equity-panel">
      <div class="equity-panel-curve">${equitySVG(ai.equity,320,90)}</div>
      <div class="equity-panel-val" style="color:${eqColor}">
        ${fmtUSD_id(eq.usd)} <span class="equity-pct">(${fmtPct_id(eq.pct)})</span>
      </div>
      <label class="equity-input-label">Titik Equity Curve (pisah koma / spasi)</label>
      <input type="text" id="equityInput" class="equity-input" value="${esc((ai.equity||[]).join(', '))}" placeholder="cth: 0, 120, 90, 260, 380, 520">
    </div>

    <div class="trade-edit-list" id="tradeList">${tradesHtml}</div>

    <div class="add-trade-btn" id="btnAddTrade">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
      Tambah Trade
    </div>
  `;

  // bind events
  document.getElementById('btnBack').onclick=closeFocus;
  document.getElementById('aiNameInput').oninput=e=>{ai.name=e.target.value;save();};
  document.getElementById('equityInput').oninput=e=>{
    ai.equity=e.target.value.split(/[\s,]+/).map(s=>parseFloat(s)).filter(v=>!isNaN(v));
    save();
    // live update curve + value without losing input focus
    const eq2=equitySummary(ai.equity);
    const c=focus.querySelector('.equity-panel-curve');
    const v=focus.querySelector('.equity-panel-val');
    if(c)c.innerHTML=equitySVG(ai.equity,320,90);
    if(v){
      v.style.color=eq2.usd>=0?'var(--violet)':'var(--loss)';
      v.innerHTML=fmtUSD_id(eq2.usd)+' <span class="equity-pct">('+fmtPct_id(eq2.pct)+')</span>';
    }
  };
  document.getElementById('btnAddTrade').onclick=()=>{
    ai.trades.push(mkTrade('NEW','',ai.trades.length%2===0?'profit':'loss',0,0));
    save();renderFocus();
  };

  focus.querySelectorAll('.trade-edit').forEach(el=>{
    const ti=parseInt(el.dataset.ti);
    el.querySelectorAll('input[data-f]').forEach(inp=>{
      inp.oninput=()=>{
        const f=inp.dataset.f;
        ai.trades[ti][f]=(f==='pl'||f==='pct')?parseFloat(inp.value)||0:inp.value;
        save();
        // live-update preview spans without full re-render (keep focus)
        const plSpan=el.querySelector('.pv-pl');
        const symSpan=el.querySelector('.pv-sym');
        const tagSpan=el.querySelector('.pv-tag');
        symSpan.textContent=ai.trades[ti].sym;
        tagSpan.textContent=ai.trades[ti].tag;
        plSpan.innerHTML=fmtMoneySimple(ai.trades[ti].pl)+' <small style="opacity:.7">'+fmtPct(ai.trades[ti].pct)+'</small>';
        plSpan.style.color=ai.trades[ti].color==='profit'?'var(--profit)':'var(--loss)';
      };
    });
    el.querySelectorAll('.color-opt').forEach(opt=>{
      opt.onclick=()=>{
        ai.trades[ti].color=opt.dataset.v;
        save();renderFocus();
      };
    });
    el.querySelector('[data-action="del-trade"]').onclick=()=>{
      ai.trades.splice(ti,1);
      save();renderFocus();
    };
  });
}

============================================================ */
let inPreview=false;
document.getElementById('btnPreview').onclick=()=>{
  inPreview=true;
  document.body.classList.add('preview');
  document.getElementById('btnExitPreview').style.display='flex';
};
document.getElementById('btnExitPreview').onclick=()=>{

};

/* ============================================================
   DOWNLOAD (HD export via html2canvas-like manual render)
============================================================ */
document.getElementById('btnDownload').onclick=async ()=>{
  showToast('Menyiapkan gambar...');
  await downloadHD();
};

async function downloadHD(){
  const wasPreview=inPreview;
  if(!inPreview){
    document.body.classList.add('preview');
  }
  const target=document.getElementById('focus').classList.contains('active')
    ? document.getElementById('focus')
    : document.getElementById('main');

  try{
    if(!window.html2canvas){
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js');
    }
    const bg=getComputedStyle(document.body).backgroundColor;
    const canvas=await window.html2canvas(target,{
      backgroundColor:bg,
      scale:2,
      useCORS:true
    });
    const link=document.createElement('a');
    link.download='jurnal-ai-vs-ai-'+Date.now()+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    showToast('Gambar tersimpan!');
  }catch(err){
    console.error(err);
    showToast('Gagal export: '+err.message);
  }finally{
    if(!wasPreview)document.body.classList.remove('preview');
  }
}

function loadScript(src){
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src=src;
    s.onload=resolve;
    s.onerror=()=>reject(new Error('gagal load library export'));
    document.head.appendChild(s);
  });
}

/* ============================================================
   TOAST
============================================================ */
let toastTimer=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
